<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pixel Sparkle</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 230px;
        font-family: "Segoe UI", sans-serif;
        background: #0d0a18;
        color: #f0e6ff;
        padding: 18px 16px 16px;
      }
      .title {
        font-size: 14px;
        font-weight: 700;
        color: #ffd6f5;
        margin-bottom: 3px;
        letter-spacing: 0.4px;
      }
      .sub {
        font-size: 11px;
        color: #9087b0;
        margin-bottom: 14px;
      }
      .sprites-row {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: 14px;
        justify-content: center;
      }
      .sprites-row img {
        width: 24px;
        height: 24px;
        image-rendering: pixelated;
      }
      .tip {
        font-size: 11px;
        color: #7a7094;
        border-top: 1px solid #1e1a30;
        padding-top: 11px;
        line-height: 1.55;
      }
      .tip span {
        color: #b3a9ff;
      }
      .btn {
        padding: 6px 10px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.02);
        color: #f0e6ff;
        font-size: 12px;
        cursor: pointer;
      }
      .btn.active {
        background: rgba(255, 218, 255, 0.06);
        border-color: #ffd6f5;
      }
    </style>
  </head>
  <body>
    <div class="title">✨ Pixel Sparkle Cursor</div>
    <div class="sub">Stardew Valley Edition · Active everywhere</div>
    <div class="sprites-row" id="preview"></div>
    <div style="margin: 10px 0 12px">
      <label
        style="
          font-size: 12px;
          color: #a99bd6;
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <span>Particles per move</span>
        <span id="popup-count-value" style="font-size: 12px; color: #cfc0ff"
          >0.15</span
        >
      </label>
      <input
        id="popup-count"
        type="range"
        min="0.01"
        max="0.33"
        step="0.01"
        value="0.15"
        style="width: 100%; margin: 6px 0"
      />

      <label
        style="
          font-size: 12px;
          color: #a99bd6;
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <span>Sprite size</span>
        <span id="popup-size-value" style="font-size: 12px; color: #cfc0ff"
          >22</span
        >
      </label>
      <input
        id="popup-size"
        type="range"
        min="12"
        max="48"
        step="1"
        value="22"
        style="width: 100%; margin: 6px 0 10px"
      />

      <div
        style="
          display: flex;
          gap: 6px;
          flex-wrap: wrap;
          justify-content: center;
          margin-top: 6px;
        "
      >
        <button class="btn active" id="popup-gravity">🌍</button>
        <button class="btn" id="popup-float">🌌</button>
        <button class="btn" id="popup-burst">💥</button>
        <button class="btn" id="popup-rain">🌧️</button>
      </div>
    </div>
    <div class="tip">
      Move your cursor anywhere to see <span>Stardew sprites</span> trail behind
      you!
    </div>
    <script src="popup.js"></script>
  </body>
</html>
